<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>恋愛・花タイプ診断</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>
body {
  font-family:'Hiragino Kaku Gothic ProN','Meiryo',sans-serif;
  background:#fff6ea;
  margin:0;
}

.content{
  max-width:600px;
  margin:30px auto;
  padding:20px;
  background:#fff;
  border-radius:16px;
  box-shadow:0 4px 16px rgba(0,0,0,0.1);
}

h1{text-align:center;color:#c45ca0;}

.question{margin-top:20px;}
label{display:block;margin-bottom:6px;}

button{
  margin-top:25px;
  padding:12px;
  width:100%;
  border:none;
  border-radius:10px;
  background:#ff5ca8;
  color:#fff;
  font-size:16px;
  font-weight:bold;
}

#result{
  margin-top:25px;
}
</style>
</head>

<body>

<div class="content">
<h1>恋愛 花タイプ診断</h1>

<form id="flowerForm">

<h3>☆恋の始まり方</h3>

<div class="question">
<p>恋をすると相手を考える時間が増える</p>
<label><input type="radio" name="q1" value="A" required>はい</label>
<label><input type="radio" name="q1" value="B">どちらとも言えない</label>
<label><input type="radio" name="q1" value="C">いいえ</label>
</div>

<div class="question">
<p>恋人とは話し合いを大切にしたい</p>
<label><input type="radio" name="q2" value="A" required>はい</label>
<label><input type="radio" name="q2" value="B">どちらとも言えない</label>
<label><input type="radio" name="q2" value="C">いいえ</label>
</div>

<div class="question">
<p>好きな人を優先する</p>
<label><input type="radio" name="q3" value="A" required>はい</label>
<label><input type="radio" name="q3" value="B">どちらとも言えない</label>
<label><input type="radio" name="q3" value="C">いいえ</label>
</div>

<h3>♡理想の関係</h3>

<div class="question">
<p>こまめに連絡したい</p>
<label><input type="radio" name="q4" value="A" required>はい</label>
<label><input type="radio" name="q4" value="B">どちらとも言えない</label>
<label><input type="radio" name="q4" value="C">いいえ</label>
</div>

<div class="question">
<p>会えないと不安になる</p>
<label><input type="radio" name="q5" value="A" required>はい</label>
<label><input type="radio" name="q5" value="B">どちらとも言えない</label>
<label><input type="radio" name="q5" value="C">いいえ</label>
</div>

<div class="question">
<p>一緒の時間が多い方がいい</p>
<label><input type="radio" name="q6" value="A" required>はい</label>
<label><input type="radio" name="q6" value="B">どちらとも言えない</label>
<label><input type="radio" name="q6" value="C">いいえ</label>
</div>

<button type="submit">診断する</button>

</form>

<div id="result"></div>

</div>

<script>
document.getElementById("flowerForm").addEventListener("submit", function(e){
e.preventDefault();

function freq(arr){
let c={A:0,B:0,C:0};
arr.forEach(v=>c[v]++);
let m=Math.max(c.A,c.B,c.C);
let t=Object.keys(c).filter(k=>c[k]===m);
return t.length===1?t[0]:"TIE";
}

let star=freq([
document.querySelector('input[name="q1"]:checked').value,
document.querySelector('input[name="q2"]:checked').value,
document.querySelector('input[name="q3"]:checked').value
]);

let heart=freq([
document.querySelector('input[name="q4"]:checked').value,
document.querySelector('input[name="q5"]:checked').value,
document.querySelector('input[name="q6"]:checked').value
]);

let html="<h3>診断結果</h3>";

if(star==="TIE"){
html+=`
<p>☆追加質問</p>
<label><input type="radio" name="starExtra" value="A">一気に盛り上がる</label>
<label><input type="radio" name="starExtra" value="B">自然に始まる</label>
<label><input type="radio" name="starExtra" value="C">きっかけで始まる</label>
`;
}

if(heart==="TIE"){
html+=`
<p>♡追加質問</p>
<label><input type="radio" name="heartExtra" value="A">常に一緒</label>
<label><input type="radio" name="heartExtra" value="B">バランス</label>
<label><input type="radio" name="heartExtra" value="C">距離も大事</label>
`;
}

if(star==="TIE"||heart==="TIE"){
html+=`<button id="extraBtn">結果を見る</button>`;
document.getElementById("result").innerHTML=html;

document.getElementById("extraBtn").onclick=function(){
if(star==="TIE"){
star=document.querySelector('input[name="starExtra"]:checked')?.value;
if(!star)return alert("回答してください");
}
if(heart==="TIE"){
heart=document.querySelector('input[name="heartExtra"]:checked')?.value;
if(!heart)return alert("回答してください");
}
showFinal(star,heart);
};
return;
}

showFinal(star,heart);

function showFinal(star,heart){

const map={
"A_A":"🥀バラ：愛が深く一途",
"A_B":"🏵️ガーベラ：優しく誠実",
"A_C":"🌺ダリア：静かで深い愛",
"B_A":"🪻ラベンダー：癒し系",
"B_B":"🌼コスモス：バランス型",
"B_C":"🪷アザミ：慎重タイプ",
"C_A":"🌻ひまわり：明るく直感型",
"C_B":"🌷チューリップ：自然体",
"C_C":"🌸さくら：繊細で自由"
};

let text=map[star+"_"+heart];

document.getElementById("result").innerHTML=`
<h3>あなたのタイプ</h3>
<p>${text}</p>

<div style="margin-top:15px;padding:15px;background:#fff0f6;border-radius:10px;">
👉相手はどう感じている？
</div>

<div style="margin-top:15px;padding:15px;border:1px dashed #ff8ad6;border-radius:10px;">
この答えは診断では分かりません<br>
鑑定師があなた専用に読み解きます
</div>

<div style="text-align:center;margin-top:20px;">
<a href="https://app-clear.com/open?act=otherprofile-67ad661d3ea9cf282502199c"
style="background:#ff5ca8;color:#fff;padding:12px 30px;border-radius:20px;text-decoration:none;">
鑑定する
</a>
</div>
`;
}
});
</script>

</body>
</html>
