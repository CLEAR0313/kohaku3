<script>
document.getElementById("flowerForm").addEventListener("submit", function(e){
  e.preventDefault();

  const starAnswers = [
    document.querySelector('input[name="q1"]:checked').value,
    document.querySelector('input[name="q2"]:checked').value,
    document.querySelector('input[name="q3"]:checked').value
  ];
  const heartAnswers = [
    document.querySelector('input[name="q4"]:checked').value,
    document.querySelector('input[name="q5"]:checked').value,
    document.querySelector('input[name="q6"]:checked').value
  ];

  function freq(arr){
    let c = {A:0,B:0,C:0};
    arr.forEach(v=>c[v]++);
    let m = Math.max(c.A,c.B,c.C);
    let t = Object.keys(c).filter(k=>c[k]===m);
    return t.length===1 ? t[0] : "TIE";
  }

  let star = freq(starAnswers);
  let heart = freq(heartAnswers);

  if(star==="TIE" || heart==="TIE"){
    document.getElementById("result").innerHTML = "追加質問に対応してください";
    return;
  }

  showFinal(star, heart);

  function showFinal(star, heart){

    const resultMap = {

      "A_A": `🥀花タイプ｜バラ【☆A】【♡A】
愛が深く、まっすぐで一度好きになると揺らぎにくいタイプ
恋の始まり：直感で惹かれやすく一気に気持ちが高まりやすい
長所：一途・情熱的
短所：不安になりやすい
魅力：深い愛情
👉相手はこの想いをどう感じている？`,

      "A_B": `🏵️花タイプ｜ガーベラ【☆A】【♡B】
まじめで前向き
長所：健気・優しい
短所：尽くしすぎ
👉優しさはどう伝わってる？`,

      "A_C": `🌺花タイプ｜ダリア【☆A】【♡C】
静かに深く愛するタイプ
長所：ブレない愛
短所：伝わりにくい
👉気持ちは伝わってる？`,

      "B_A": `🪻花タイプ｜ラベンダー【☆B】【♡A】
癒し系タイプ
👉本音を出せてる？`,

      "B_B": `🌼花タイプ｜コスモス【☆B】【♡B】
バランス型
👉今の関係満足してる？`,

      "B_C": `🪷花タイプ｜アザミ【☆B】【♡C】
距離を取りがちなタイプ
👉心の距離どう感じてる？`,

      "C_A": `🌻花タイプ｜ひまわり【☆C】【♡A】
ポジティブタイプ
👉素直さどう受け取られてる？`,

      "C_B": `🌷花タイプ｜チューリップ【☆C】【♡B】
自然体タイプ
👉本気度伝わってる？`,

      "C_C": `🌸花タイプ｜さくら【☆C】【♡C】
繊細で自由
👉どこまで理解されてる？`
    };

    const key = `${star}_${heart}`;
    const text = resultMap[key] || "診断結果を表示できません";

    let finalHTML = `
      <h3>あなたの診断結果</h3>
      <p>☆ → ${star} / ♡ → ${heart}</p>

      <div style="margin-top:15px; padding:12px; background:#fff0f6; border-radius:10px; line-height:1.7;">
        ${text.replace(/\n/g,"<br>")}
      </div>

      <div style="margin-top:20px; padding:14px; background:#fff; border:1px dashed #ff8ad6; border-radius:10px;">
        <p style="margin:0; font-weight:bold; color:#c8007b;">
          この答えは“診断だけでは不十分です”
        </p>
        <p style="margin-top:8px;">
          あなた専用の答えは鑑定師が読み解きます🔮
        </p>
      </div>

      <div style="text-align:center; margin-top:18px;">
        <a href="https://app-clear.com/open?act=otherprofile-67ad661d3ea9cf282502199c"
        style="background:#ff5ca8;color:#fff;padding:12px 32px;border-radius:24px;text-decoration:none;font-weight:bold;">
        鑑定師に答えを聞く
        </a>
      </div>
    `;

    document.getElementById("result").innerHTML = finalHTML;
  }

});
</script>
