<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>恋愛 花タイプ診断</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>
body{
font-family:'Hiragino Kaku Gothic ProN','Meiryo',sans-serif;
background:#fff6ea;
margin:0;
}

.content{
max-width:600px;
margin:30px auto;
padding:20px;
background:#fff;
border-radius:16px;
box-shadow:0 4px 16px rgba(0,0,0,0.1);
}

h1{text-align:center;color:#c45ca0;}

.question{margin-top:20px;}
label{display:block;margin-bottom:6px;}

button{
margin-top:25px;
padding:12px;
width:100%;
border:none;
border-radius:10px;
background:#ff5ca8;
color:#fff;
font-size:16px;
font-weight:bold;
}

#result{margin-top:25px;}
</style>
</head>

<body>

<div class="content">
<h1>恋愛 花タイプ診断</h1>

<form id="flowerForm">

<h3>☆恋の傾向</h3>

<div class="question">
<p>恋をすると相手を考える時間が増える</p>
<label><input type="radio" name="q1" value="A" required>はい</label>
<label><input type="radio" name="q1" value="B">どちらとも言えない</label>
<label><input type="radio" name="q1" value="C">いいえ</label>
</div>

<div class="question">
<p>恋人とは話し合いを大切にしたい</p>
<label><input type="radio" name="q2" value="A" required>はい</label>
<label><input type="radio" name="q2" value="B">どちらとも言えない</label>
<label><input type="radio" name="q2" value="C">いいえ</label>
</div>

<div class="question">
<p>好きな人を優先する</p>
<label><input type="radio" name="q3" value="A" required>はい</label>
<label><input type="radio" name="q3" value="B">どちらとも言えない</label>
<label><input type="radio" name="q3" value="C">いいえ</label>
</div>

<h3>♡関係性</h3>

<div class="question">
<p>こまめに連絡したい</p>
<label><input type="radio" name="q4" value="A" required>はい</label>
<label><input type="radio" name="q4" value="B">どちらとも言えない</label>
<label><input type="radio" name="q4" value="C">いいえ</label>
</div>

<div class="question">
<p>会えないと不安になる</p>
<label><input type="radio" name="q5" value="A" required>はい</label>
<label><input type="radio" name="q5" value="B">どちらとも言えない</label>
<label><input type="radio" name="q5" value="C">いいえ</label>
</div>

<div class="question">
<p>一緒の時間が多い方がいい</p>
<label><input type="radio" name="q6" value="A" required>はい</label>
<label><input type="radio" name="q6" value="B">どちらとも言えない</label>
<label><input type="radio" name="q6" value="C">いいえ</label>
</div>

<button type="submit">診断する</button>

</form>

<div id="result"></div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

const form = document.getElementById("flowerForm");
if(!form) return;

form.addEventListener("submit", function(e){
e.preventDefault();

function freq(arr){
let c={A:0,B:0,C:0};
arr.forEach(v=>c[v]++);
let m=Math.max(c.A,c.B,c.C);
let t=Object.keys(c).filter(k=>c[k]===m);
return t[0];
}

let star=freq([
document.querySelector('input[name="q1"]:checked').value,
document.querySelector('input[name="q2"]:checked').value,
document.querySelector('input[name="q3"]:checked').value
]);

let heart=freq([
document.querySelector('input[name="q4"]:checked').value,
document.querySelector('input[name="q5"]:checked').value,
document.querySelector('input[name="q6"]:checked').value
]);

showFinal(star,heart);

function showFinal(star,heart){

const map={
"A_A":"🌹バラ：愛が深く一途<br><br>👉 愛の熱量はどう感じてる？",
"A_B":"🏵️ガーベラ：誠実で優しい<br><br>👉 優しさはどう伝わってる？",
"A_C":"🌺ダリア：静かに深く愛する<br><br>👉 気持ちは伝わってる？",
"B_A":"🪻ラベンダー：癒し系<br><br>👉 もっとこうしてほしい？",
"B_B":"🌼コスモス：バランス型<br><br>👉 満足度はどれくらい？",
"B_C":"🪷アザミ：慎重タイプ<br><br>👉 心の距離は？",
"C_A":"🌻ひまわり：明るく直感型<br><br>👉 素直さはどう見られてる？",
"C_B":"🌷チューリップ：自然体<br><br>👉 本気度は伝わってる？",
"C_C":"🌸さくら：繊細で自由<br><br>👉 理解されてる？"
};

let key=star+"_"+heart;

document.getElementById("result").innerHTML=`
<h3>あなたの診断結果</h3>

<div style="background:#fff0f6;padding:15px;border-radius:10px;">
${map[key]}
</div>

<div style="margin-top:15px;">
この答えは診断では分かりません💦<br>
鑑定師があなた専用に読み解きます🔮
</div>

<div style="text-align:center;margin-top:20px;">
<a href="https://app-clear.com/open?act=otherprofile-67ad661d3ea9cf282502199c"
style="background:#ff5ca8;color:#fff;padding:14px 36px;border-radius:30px;text-decoration:none;">
答えを見に行く
</a>
</div>
`;
}

});

});
</script>

</body>
</html>
